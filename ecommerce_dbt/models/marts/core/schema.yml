version: 2

models:

  # ======================
  # DIMENSIONS
  # ======================

  - name: dim_customers
    description: "Customer dimension table (1 row per customer)"
    columns:
      - name: customer_id
        tests: [not_null, unique]

      - name: customer_unique_id
        tests: [not_null]

      - name: customer_state
        tests:
          - not_null
          - accepted_values:
              values:
                - SP
                - RJ
                - MG
                - RS
                - PR
                - SC
                - BA
                - DF
                - GO
                - PE
                - CE
                - PA
                - ES
                - MA
                - MS
                - MT
                - PB
                - PI
                - RN
                - RO
                - SE
                - TO
                - AC
                - AL
                - AM
                - AP
                - RR

  - name: dim_products
    description: "Product dimension"
    columns:
      - name: product_id
        tests: [not_null, unique]

      - name: product_category
        tests: [not_null]

  - name: dim_sellers
    description: "Seller dimension"
    columns:
      - name: seller_id
        tests: [not_null, unique]

      - name: seller_state
        tests:
          - not_null
          - accepted_values:
              values:
                - SP
                - RJ
                - MG
                - RS
                - PR
                - SC
                - BA
                - DF
                - GO
                - PE
                - CE
                - PA
                - ES
                - MA
                - MS
                - MT
                - PB
                - PI
                - RN
                - RO
                - SE
                - TO
                - AC
                - AL
                - AM
                - AP
                - RR

  # ======================
  # FACTS
  # ======================

  - name: fact_orders
    description: "Order fact table (1 row per order)"
    columns:
      - name: order_id
        tests: [not_null, unique]

      - name: customer_sk
        tests:
          - not_null
          - relationships:
              to: ref('dim_customers')
              field: customer_sk

      - name: order_status
        tests:
          - not_null
          - accepted_values:
              values:
                - delivered
                - shipped
                - processing
                - invoiced
                - canceled
                - unavailable
                - created
                - approved


  - name: fact_order_items
    description: "Order items fact table (1 row per item)"
    columns:
      - name: order_id
        tests:
          - not_null
          - relationships:
              to: ref('fact_orders')
              field: order_id

      - name: product_sk
        tests:
          - not_null
          - relationships:
              to: ref('dim_products')
              field: product_sk

      - name: seller_sk
        tests:
          - not_null
          - relationships:
              to: ref('dim_sellers')
              field: seller_sk

      - name: price
        tests:
          - not_null

      - name: freight_value
        tests:
          - not_null
